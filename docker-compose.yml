services:
  app:
    build: .
    container_name: aeon-app
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      WEB_PORT: "5173"
      DATABASE_URL: "postgresql://aeon:aeon@postgres:5432/aeon"
      POSTGRES_USERS_TABLE: "${POSTGRES_USERS_TABLE:-registrations}"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_AGENT_HISTORY_TTL: "${REDIS_AGENT_HISTORY_TTL:-2592000}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      BOT_USERNAME: "${BOT_USERNAME:-}"
      WEBAPP_URL: "${WEBAPP_URL:-https://example.com}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      GEMINI_MAX_OUTPUT_TOKENS: "${GEMINI_MAX_OUTPUT_TOKENS:-2500}"
      REMINDER_HOUR: "${REMINDER_HOUR:-9}"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: aeon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aeon
      POSTGRES_PASSWORD: aeon
      POSTGRES_DB: aeon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aeon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  redis_data:
